name: Deploy Site

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Resolve GitHub Pages base paths
        run: |
          repo_name="${GITHUB_REPOSITORY#*/}"
          owner_site="${GITHUB_REPOSITORY_OWNER}.github.io"
          if [ "$repo_name" = "$owner_site" ]; then
            echo "BLOG_BASEURL=/blog" >> "$GITHUB_ENV"
            echo "KAI_DOCS_BASE=/" >> "$GITHUB_ENV"
          else
            echo "BLOG_BASEURL=/$repo_name/blog" >> "$GITHUB_ENV"
            echo "KAI_DOCS_BASE=/$repo_name/" >> "$GITHUB_ENV"
          fi

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Install blog gems
        working-directory: blog
        run: bundle install

      - name: Build documentation
        run: npm run docs:build

      - name: Merge docs into site artifact
        run: npm run site:merge

      - name: Build Jekyll blog
        working-directory: blog
        run: bundle exec jekyll build --destination ../_site/blog --baseurl "${BLOG_BASEURL}"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
