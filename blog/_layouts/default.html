<!doctype html>
<html lang="{{ site.lang | default: 'en-US' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | escape }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Newsreader:opsz,wght@6..72,400;6..72,500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
    <script defer src="{{ '/assets/js/blog.js' | relative_url }}"></script>
  </head>
  <body>
    {% assign docs_home = site.baseurl | replace: '/blog', '' %}
    {% if docs_home == '' %}
      {% assign docs_home = '/' %}
    {% endif %}

    <div class="site-shell">
      <header class="site-header">
        <a class="site-brand" href="{{ '/' | relative_url }}">Kai</a>
        <nav class="site-nav" aria-label="Primary">
          <a href="{{ '/' | relative_url }}">Blog</a>
          <a href="{{ docs_home }}">Docs</a>
          <a href="{{ site.repository_url }}">GitHub</a>
        </nav>
      </header>

      <main class="site-main">
        {{ content }}
      </main>

      <footer class="site-footer">
        <p>Built with Jekyll for the blog and VitePress for docs.</p>
      </footer>
    </div>
  </body>
</html>
